{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(120deg,#151f35);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.main-container{
display:flex;
width:750px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
}

.left{
width:50%;
background:#f5f6fa;
display:flex;
align-items:center;
justify-content:center;
}

.left img{
width:80%;
}

.right{
width:50%;
padding:40px;
}

h2{
margin-bottom:10px;
}

p{
color:gray;
margin-bottom:25px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:linear-gradient(120deg,#6a82fb,#a044ff);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.social{
margin-top:20px;
text-align:center;
color:gray;
}

</style>
</head>

<body>

<div class="main-container">

<div class="left">
<img src="{% static 'images/log.png' %}">
</div>

<div class="right">

<h2>Welcome Back</h2>
<p>Login to continue</p>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">
<input type="submit" value="Login">

</form>

<div class="social">
    <p>
<a href="{% url 'Register' %}">Create account</a>
    </p>
</div>

{{data}}

</div>

</div>

</body>
</html>
